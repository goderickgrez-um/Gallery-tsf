<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Galería 3D</title>
<style>
  html,body{margin:0;height:100%;background:#0a0b0d;color:#e9e3d6;font-family:-apple-system,Segoe UI,Roboto,sans-serif;overflow:hidden}
  #load{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:18px;text-align:center;padding:24px}
  #load .t{font-size:15px;letter-spacing:.14em;text-transform:uppercase;color:#d6b873}
  #load .bar{width:min(340px,72vw);height:8px;border-radius:99px;background:rgba(255,255,255,.09);overflow:hidden;border:1px solid rgba(214,184,115,.35)}
  #load #fill{height:100%;width:0;background:linear-gradient(90deg,#b8933f,#e2c784);transition:width .2s}
  #load #pct{font-size:13px;color:#9b9484}
  #load .sub{font-size:12px;color:#6f6a5e;max-width:320px;line-height:1.5}
  #load.err .t{color:#e08a8a}
  iframe{position:fixed;inset:0;width:100%;height:100%;border:0;display:block}
</style>
</head>
<body>
<div id="load">
  <div class="t">Cargando galería…</div>
  <div class="bar"><div id="fill"></div></div>
  <div id="pct">0%</div>
  <div class="sub">Reuniendo los fragmentos. La primera carga puede tardar según tu conexión; luego queda en caché.</div>
</div>
<script>
  var PARTS = ['galeria-1.bin','galeria-2.bin'];
  var TOTAL = 41564547;
  function setP(f){ var pc=Math.max(0,Math.min(100,Math.round(f*100))); document.getElementById('fill').style.width=pc+'%'; document.getElementById('pct').textContent=pc+'%'; }
  function fail(msg){ var el=document.getElementById('load'); el.className='err'; el.innerHTML='<div class="t">No se pudo cargar</div><div class="sub">'+msg+'</div>'; }
  (function(){
    var chunks=[], loaded=0, idx=0;
    function next(){
      if(idx>=PARTS.length){ return assemble(); }
      fetch(PARTS[idx]).then(function(res){
        if(!res.ok) throw new Error('Fragmento '+PARTS[idx]+': '+res.status+' '+res.statusText);
        if(res.body && res.body.getReader){
          var reader=res.body.getReader();
          return (function pump(){ return reader.read().then(function(r){ if(r.done) return; chunks.push(r.value); loaded+=r.value.length; setP(loaded/TOTAL); return pump(); }); })();
        } else {
          return res.arrayBuffer().then(function(buf){ var u=new Uint8Array(buf); chunks.push(u); loaded+=u.length; setP(loaded/TOTAL); });
        }
      }).then(function(){ idx++; next(); }).catch(function(e){ fail(e.message); });
    }
    function assemble(){
      var all=new Uint8Array(loaded), off=0;
      for(var i=0;i<chunks.length;i++){ all.set(chunks[i],off); off+=chunks[i].length; }
      var url=URL.createObjectURL(new Blob([all],{type:'text/html'}));
      var f=document.createElement('iframe');
      f.src=url;
      f.allow='fullscreen; pointer-lock; gamepad; accelerometer; gyroscope; magnetometer; xr-spatial-tracking';
      f.allowFullscreen=true;
      document.body.appendChild(f);
      var el=document.getElementById('load'); if(el) el.style.display='none';
    }
    next();
  })();
</script>
</body>
</html>
